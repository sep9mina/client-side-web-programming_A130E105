<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入生活實驗室 - 會員註冊</title>
    <style>
        /* 簡單的 CSS 美化，讓版面乾淨一點 */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f4f9; /* 淡淡的灰紫色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* 確保 padding 不會撐大寬度 */
            font-size: 1rem;
        }
        /* 針對按鈕的設計 */
        button {
            width: 100%;
            padding: 1rem;
            background-color: #4CAF50; /* 健康的綠色 */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .note {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 加入 Mina's Life Lab</h2>
    
    <form action="#" method="POST">
        
        <div class="form-group">
            <label for="username">使用者名稱 (ID)</label>
            <input type="text" id="username" name="username" placeholder="請輸入您喜歡的暱稱" required>
        </div>

        <div class="form-group">
            <label for="email">電子信箱 (Email)</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
            <label for="password">設定密碼</label>
            <input type="password" id="password" name="password" placeholder="至少 8 碼英數字" required>
        </div>

        <div class="form-group">
            <label for="birthdate">您的生日</label>
            <input type="date" id="birthdate" name="birthdate">
        </div>

        <div class="form-group">
            <label for="diet">目前的飲食目標</label>
            <select id="diet" name="diet">
                <option value="balanced">均衡飲食 (無特殊限制)</option>
                <option value="low-carb">低碳 / 減醣飲食</option>
                <option value="high-protein">高蛋白增肌</option>
                <option value="vegetarian">素食 / 蔬食</option>
                <option value="keto">生酮飲食</option>
            </select>
        </div>

        <button type="submit">立即註冊會員</button>
        
        <p class="note">註冊即代表同意我們的使用者條款與隱私政策。</p>
    </form>
</div>

</body>
</html>
